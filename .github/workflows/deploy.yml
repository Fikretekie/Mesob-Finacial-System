# Required GitHub Secrets:
#   Production (main): AWS_*, PROD_API_URL, PROD_S3_BUCKET, PROD_APP_URL,
#     PROD_COGNITO_USER_POOL_ID, PROD_COGNITO_CLIENT_ID, PROD_COGNITO_DOMAIN,
#     PROD_GOOGLE_CLIENT_ID, PROD_APPLE_CLIENT_ID
#   Staging: AWS_*, STAGING_API_URL, STAGING_S3_BUCKET, STAGING_APP_URL,
#     STAGING_COGNITO_USER_POOL_ID, STAGING_COGNITO_CLIENT_ID, STAGING_COGNITO_DOMAIN,
#     STAGING_GOOGLE_CLIENT_ID, STAGING_APPLE_CLIENT_ID
name: Deploy to Amazon S3

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create .env file (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          cat > .env << EOF
          REACT_APP_API_URL=${{ secrets.PROD_API_URL }}
          REACT_APP_ENV=production
          REACT_APP_S3_BUCKET=${{ secrets.PROD_S3_BUCKET }}
          REACT_APP_PRODUCTION_APP_URL=${{ secrets.PROD_APP_URL }}
          REACT_APP_PRODUCTION_COGNITO_USER_POOL_ID=${{ secrets.PROD_COGNITO_USER_POOL_ID }}
          REACT_APP_PRODUCTION_COGNITO_CLIENT_ID=${{ secrets.PROD_COGNITO_CLIENT_ID }}
          REACT_APP_PRODUCTION_COGNITO_DOMAIN=${{ secrets.PROD_COGNITO_DOMAIN }}
          REACT_APP_PRODUCTION_GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          REACT_APP_PRODUCTION_APPLE_CLIENT_ID=${{ secrets.PROD_APPLE_CLIENT_ID }}
          EOF

      - name: Create .env file (Staging)
        if: github.ref == 'refs/heads/staging'
        run: |
          cat > .env << EOF
          REACT_APP_API_URL=${{ secrets.STAGING_API_URL }}
          REACT_APP_ENV=staging
          REACT_APP_S3_BUCKET=${{ secrets.STAGING_S3_BUCKET }}
          REACT_APP_STAGING_APP_URL=${{ secrets.STAGING_APP_URL }}
          REACT_APP_STAGING_COGNITO_USER_POOL_ID=${{ secrets.STAGING_COGNITO_USER_POOL_ID }}
          REACT_APP_STAGING_COGNITO_CLIENT_ID=${{ secrets.STAGING_COGNITO_CLIENT_ID }}
          REACT_APP_STAGING_COGNITO_DOMAIN=${{ secrets.STAGING_COGNITO_DOMAIN }}
          REACT_APP_STAGING_GOOGLE_CLIENT_ID=${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
          REACT_APP_STAGING_APPLE_CLIENT_ID=${{ secrets.STAGING_APPLE_CLIENT_ID }}
          EOF

      - name: Verify .env exists (env is baked into build – no .env on S3)
        run: |
          if [ ! -f .env ]; then echo "::error::No .env created. Check that workflow ran for main or staging."; exit 1; fi
          echo "REACT_APP_ENV is set. Add GitHub Secrets if any REACT_APP_* values are empty."

      - name: Build React App
        run: npm install --legacy-peer-deps && npm run build

      - name: Deploy to Production S3
        if: github.ref == 'refs/heads/main'
        run: aws s3 sync ./build/ s3://app.mesobfinancial.com

      - name: Deploy to Staging S3
        if: github.ref == 'refs/heads/staging'
        run: aws s3 sync ./build/ s3://staging.mesobfinancial.com
